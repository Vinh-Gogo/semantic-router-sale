<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Similarity Tester</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        :root{
            --bg:#0c0a09;--bg2:rgba(255,247,237,.03);--bg3:rgba(255,247,237,.05);
            --border:rgba(255,247,237,.07);--border-h:rgba(255,247,237,.13);
            --t1:#fafaf9;--t2:#a8a29e;--t3:#57534e;--t4:#292524;
            --amber:#f59e0b;--amber2:#d97706;
            --green:#34d399;--blue:#38bdf8;--red:#fb7185;
            --glow1:rgba(245,158,11,.08);--glow2:rgba(52,211,153,.05);
            --card-shadow:0 8px 40px rgba(0,0,0,.45);
            --input-bg:rgba(255,247,237,.03);
        }

        .light{
            --bg:#faf9f7;--bg2:rgba(12,10,9,.02);--bg3:rgba(12,10,9,.04);
            --border:rgba(12,10,9,.08);--border-h:rgba(12,10,9,.14);
            --t1:#1c1917;--t2:#78716c;--t3:#a8a29e;--t4:#d6d3d1;
            --amber:#d97706;--amber2:#b45309;
            --green:#059669;--blue:#0284c7;--red:#e11d48;
            --glow1:rgba(217,119,6,.04);--glow2:rgba(5,150,105,.03);
            --card-shadow:0 4px 20px rgba(0,0,0,.06);
            --input-bg:rgba(12,10,9,.02);
        }

        body{
            font-family:'Space Grotesk',sans-serif;
            background:var(--bg);color:var(--t1);
            min-height:100vh;transition:background .5s,color .5s;
            overflow-x:hidden;
        }
        body::before{
            content:'';position:fixed;top:-50%;left:-25%;
            width:90%;height:90%;
            background:radial-gradient(circle,var(--glow1) 0%,transparent 60%);
            pointer-events:none;transition:background .5s;
        }
        body::after{
            content:'';position:fixed;bottom:-40%;right:-20%;
            width:80%;height:80%;
            background:radial-gradient(circle,var(--glow2) 0%,transparent 55%);
            pointer-events:none;transition:background .5s;
        }

        .app{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:40px 28px 56px}

        /* ── Header ── */
        .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
        .brand{display:flex;align-items:center;gap:14px}
        .brand-icon{
            width:38px;height:38px;border-radius:10px;
            background:linear-gradient(145deg,var(--amber),var(--amber2));
            display:flex;align-items:center;justify-content:center;
            font-family:'Instrument Serif',serif;font-weight:400;font-size:20px;
            color:#0c0a09;box-shadow:0 0 24px rgba(245,158,11,.25);
        }
        .brand h1{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;letter-spacing:-.5px;color:var(--t1)}
        .brand span{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.8px;text-transform:uppercase}

        .header-right{display:flex;align-items:center;gap:10px}

        .status{
            display:flex;align-items:center;gap:7px;
            padding:6px 14px;border-radius:20px;
            background:var(--bg2);border:1px solid var(--border);
            font-family:'DM Mono',monospace;font-size:10px;color:var(--t2);
            transition:all .4s;letter-spacing:.3px;
        }
        .pulse{width:6px;height:6px;border-radius:50%;background:var(--red);transition:all .3s}
        .pulse.on{background:var(--green);box-shadow:0 0 10px var(--green);animation:pulseAnim 2s infinite}
        @keyframes pulseAnim{0%,100%{opacity:1}50%{opacity:.3}}

        .theme-btn{
            width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
            background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;
            font-size:18px;transition:all .3s;color:var(--t1);
        }
        .theme-btn:hover{border-color:var(--border-h);background:var(--bg3);transform:scale(1.06)}

        /* ── Glass Card ── */
        .glass{
            background:var(--bg2);border:1px solid var(--border);border-radius:18px;
            backdrop-filter:blur(24px);transition:all .4s;
        }
        .glass:hover{border-color:var(--border-h);box-shadow:var(--card-shadow)}

        .card-head{
            padding:16px 22px;border-bottom:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-between;transition:border-color .4s;
        }
        .card-head h3{
            font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
            color:var(--t2);text-transform:uppercase;letter-spacing:1.2px;transition:color .4s;
        }
        .card-head .tag{
            font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);
            background:var(--bg3);padding:3px 10px;border-radius:6px;transition:all .4s;
        }

        /* ── Chat ── */
        .chat-section{margin-bottom:24px}
        .chat-section .glass{display:flex;flex-direction:column}

        .msgs{
            flex:1;min-height:240px;max-height:440px;
            overflow-y:auto;overflow-x:hidden;
            padding:18px 22px;display:flex;flex-direction:column;gap:12px;
            scroll-behavior:smooth;
        }
        .msgs::-webkit-scrollbar{width:3px}
        .msgs::-webkit-scrollbar-track{background:transparent}
        .msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        .msgs::-webkit-scrollbar-thumb:hover{background:var(--border-h)}

        .empty{
            flex:1;display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            color:var(--t3);font-size:13px;gap:6px;transition:color .4s;
        }
        .empty .ico{font-size:32px;opacity:.25;margin-bottom:6px}
        .empty p{font-family:'Instrument Serif',serif;font-style:italic;font-size:15px;color:var(--t3)}

        .bubble{
            max-width:80%;padding:12px 18px;border-radius:18px;
            font-size:13px;line-height:1.6;
            animation:bubbleIn .35s cubic-bezier(.22,1,.36,1);
        }
        @keyframes bubbleIn{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:none}}

        .bubble.me{
            align-self:flex-end;
            background:linear-gradient(145deg,var(--amber),var(--amber2));
            color:#0c0a09;font-weight:500;
            border-bottom-right-radius:4px;
        }
        .bubble.sys{
            align-self:flex-start;
            background:var(--bg3);border:1px solid var(--border);
            color:var(--t1);border-bottom-left-radius:4px;
            font-size:12.5px;transition:all .4s;
        }

        /* ── Input ── */
        .input-zone{
            padding:16px 22px;border-top:1px solid var(--border);
            display:flex;gap:12px;align-items:flex-end;transition:border-color .4s;
        }
        .input-zone textarea{
            flex:1;background:var(--input-bg);border:1px solid var(--border);
            border-radius:14px;padding:13px 18px;
            font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--t1);
            resize:none;outline:none;min-height:46px;max-height:130px;
            transition:all .25s;line-height:1.5;
        }
        .input-zone textarea::placeholder{color:var(--t3);font-style:italic}
        .input-zone textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.1)}

        .send{
            height:46px;padding:0 24px;border:none;border-radius:14px;
            background:linear-gradient(145deg,var(--amber),var(--amber2));
            color:#0c0a09;font-family:'DM Mono',monospace;font-size:12px;
            font-weight:500;cursor:pointer;transition:all .25s;
            white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;
            box-shadow:0 4px 20px rgba(245,158,11,.18);
        }
        .send:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,158,11,.28)}
        .send:active{transform:translateY(0)}
        .send.off{opacity:.35;pointer-events:none;transform:none;box-shadow:none}

        /* ── History ── */
        .history-section .glass{overflow:hidden}

        .h-list{
            max-height:360px;overflow-y:auto;overflow-x:hidden;
            padding:16px 22px;display:flex;flex-direction:column;gap:12px;
        }
        .h-list::-webkit-scrollbar{width:3px}
        .h-list::-webkit-scrollbar-track{background:transparent}
        .h-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

        .h-empty{text-align:center;color:var(--t3);font-size:13px;padding:40px 0;transition:color .4s}
        .h-empty p{font-family:'Instrument Serif',serif;font-style:italic;font-size:15px}

        .h-entry{
            background:var(--bg2);border:1px solid var(--border);border-radius:14px;
            padding:16px 18px;animation:entryIn .45s cubic-bezier(.22,1,.36,1);
            transition:all .4s;
        }
        .h-entry:hover{border-color:var(--border-h);background:var(--bg3)}
        @keyframes entryIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}

        .h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
        .h-badge{
            font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
            padding:4px 12px;border-radius:8px;letter-spacing:.3px;
        }
        .h-badge.g{background:rgba(52,211,153,.1);color:var(--green)}
        .h-badge.b{background:rgba(56,189,248,.1);color:var(--blue)}
        .h-badge.r{background:rgba(251,113,133,.1);color:var(--red)}
        .h-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);transition:color .4s}

        .h-text{
            font-size:12.5px;color:var(--t2);margin-bottom:14px;
            line-height:1.45;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
            transition:color .4s;
        }

        .h-bars{display:flex;gap:10px}
        .h-bar{
            flex:1;display:flex;align-items:center;gap:7px;
            padding:7px 10px;border-radius:10px;background:var(--bg3);
            transition:background .4s;
        }
        .h-bar-label{
            font-family:'DM Mono',monospace;font-size:8px;color:var(--t3);
            white-space:nowrap;font-weight:500;text-transform:uppercase;
            letter-spacing:.6px;transition:color .4s;
        }
        .h-bar-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;transition:background .4s}
        .h-bar-fill{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}
        .h-bar-fill.g{background:var(--green)}
        .h-bar-fill.b{background:var(--blue)}
        .h-bar-fill.r{background:var(--red)}
        .h-bar-val{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;min-width:28px;text-align:right}
        .h-bar-val.g{color:var(--green)}
        .h-bar-val.b{color:var(--blue)}
        .h-bar-val.r{color:var(--red)}

        .h-tops{
            margin-top:12px;padding-top:12px;border-top:1px solid var(--border);
            display:flex;gap:12px;font-size:10px;transition:border-color .4s;
        }
        .h-tops>div{flex:1}
        .h-tg{
            font-family:'DM Mono',monospace;font-weight:600;margin-bottom:5px;
            font-size:8px;text-transform:uppercase;letter-spacing:.9px;
        }
        .h-tg.g{color:var(--green)}
        .h-tg.b{color:var(--blue)}
        .h-tg.r{color:var(--red)}
        .h-ti{
            display:flex;justify-content:space-between;color:var(--t3);
            padding:3px 0;gap:6px;transition:color .4s;font-family:'DM Mono',monospace;
        }
        .h-ti span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

        /* ── Decorative ── */
        .divider{
            width:100%;height:1px;margin:0;
            background:linear-gradient(90deg,transparent,var(--border),transparent);
        }

        /* ── Responsive ── */
        @media(max-width:640px){
            .app{padding:24px 16px 40px}
            .h-bars,.h-tops{flex-direction:column}
            .msgs{max-height:360px;min-height:200px}
            .brand h1{font-size:19px}
        }
    </style>
</head>
<body>
<div class="app">

    <!-- Header -->
    <header class="header">
        <div class="brand">
            <div class="brand-icon">S</div>
            <div>
                <h1>Similarity Tester</h1>
                <span>3-dataset classification</span>
            </div>
        </div>
        <div class="header-right">
            <div class="status">
                <div class="pulse" id="dot"></div>
                <span id="conn">Connecting</span>
            </div>
            <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Chuyển giao diện">☀</button>
        </div>
    </header>

    <!-- Chat -->
    <section class="chat-section">
        <div class="glass" style="display:flex;flex-direction:column">
            <div class="card-head">
                <h3>Chat</h3>
                <span class="tag" id="msgN">0</span>
            </div>
            <div class="msgs" id="msgs">
                <div class="empty">
                    <div class="ico">◈</div>
                    <p>Nhập tin nhắn để phân loại</p>
                </div>
            </div>
            <div class="input-zone">
                <textarea id="inp" placeholder="Nhập tin nhắn..." rows="1"></textarea>
                <button class="send" id="btn" onclick="send()">Gửi</button>
            </div>
        </div>
    </section>

    <!-- History -->
    <section class="history-section">
        <div class="glass">
            <div class="card-head">
                <h3>Lịch sử</h3>
                <span class="tag" id="hN">0</span>
            </div>
            <div class="h-list" id="hList">
                <div class="h-empty"><p>Chưa có đánh giá nào</p></div>
            </div>
        </div>
    </section>

</div>

<script>
let ws, H = [], N = 0, isLight = false;
const LM = {
    'Bình Thường': { c: 'g' },
    'Crawl Data':  { c: 'b' },
    'Tào Lao':     { c: 'r' }
};

function toggleTheme() {
    isLight = !isLight;
    document.body.classList.toggle('light', isLight);
    document.getElementById('themeBtn').textContent = isLight ? '☾' : '☀';
}

function init() {
    ws = new WebSocket(`ws://${location.host}/ws/calculate`);
    ws.onopen = () => {
        document.getElementById('dot').classList.add('on');
        document.getElementById('conn').textContent = 'Live';
    };
    ws.onclose = () => {
        document.getElementById('dot').classList.remove('on');
        document.getElementById('conn').textContent = 'Reconnect';
        setTimeout(init, 2000);
    };
}

async function send() {
    const inp = document.getElementById('inp');
    const t = inp.value.trim();
    if (!t) return;

    H.push(t);
    const full = H.join('\n');
    document.getElementById('msgN').textContent = H.length;

    const box = document.getElementById('msgs');
    const emp = box.querySelector('.empty');
    if (emp) emp.remove();

    const m = document.createElement('div');
    m.className = 'bubble me';
    m.textContent = t;
    box.appendChild(m);
    box.scrollTop = box.scrollHeight;

    inp.value = '';
    inp.style.height = 'auto';

    const btn = document.getElementById('btn');
    btn.classList.add('off');
    btn.textContent = '…';

    if (ws && ws.readyState === 1) {
        ws.send(full);
        const once = e => {
            const d = JSON.parse(e.data);
            const sc = {
                'Bình Thường': d.binh_thuong || 0,
                'Crawl Data':  d.crawl_data  || 0,
                'Tào Lao':     d.tao_lao     || 0
            };
            const pred = Object.entries(sc).sort((a, b) => b[1] - a[1])[0];
            const lm = LM[pred[0]];
            const col = pred[0] === 'Bình Thường' ? 'var(--green)'
                      : pred[0] === 'Crawl Data'  ? 'var(--blue)'
                      : 'var(--red)';

            const s = document.createElement('div');
            s.className = 'bubble sys';
            s.innerHTML = `<strong style="color:${col}">${pred[0]}</strong> ${pred[1]}%`;
            box.appendChild(s);
            box.scrollTop = box.scrollHeight;

            addHist(full, d, pred, lm);
            btn.classList.remove('off');
            btn.textContent = 'Gửi';
            ws.removeEventListener('message', once);
        };
        ws.addEventListener('message', once);
    }

    try {
        await fetch('/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: t, full_conversation: full })
        });
    } catch (e) {}
}

function addHist(text, d, pred, lm) {
    const el = document.getElementById('hList');
    const emp = el.querySelector('.h-empty');
    if (emp) emp.remove();
    document.getElementById('hN').textContent = ++N;

    const now = new Date().toLocaleTimeString('vi-VN', {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    const bt = (d.top && d.top.binh_thuong) || [];
    const cd = (d.top && d.top.crawl_data)  || [];
    const tl = (d.top && d.top.tao_lao)     || [];

    const div = document.createElement('div');
    div.className = 'h-entry';
    div.innerHTML = `
        <div class="h-top">
            <span class="h-badge ${lm.c}">${pred[0]}</span>
            <span class="h-time">${now}</span>
        </div>
        <div class="h-text">${text}</div>
        <div class="h-bars">
            <div class="h-bar">
                <span class="h-bar-label">BT</span>
                <div class="h-bar-track"><div class="h-bar-fill g" style="width:${d.binh_thuong || 0}%"></div></div>
                <span class="h-bar-val g">${d.binh_thuong || 0}%</span>
            </div>
            <div class="h-bar">
                <span class="h-bar-label">CD</span>
                <div class="h-bar-track"><div class="h-bar-fill b" style="width:${d.crawl_data || 0}%"></div></div>
                <span class="h-bar-val b">${d.crawl_data || 0}%</span>
            </div>
            <div class="h-bar">
                <span class="h-bar-label">TL</span>
                <div class="h-bar-track"><div class="h-bar-fill r" style="width:${d.tao_lao || 0}%"></div></div>
                <span class="h-bar-val r">${d.tao_lao || 0}%</span>
            </div>
        </div>
        <div class="h-tops">
            <div>
                <div class="h-tg g">Top BT</div>
                ${bt.map(x => `<div class="h-ti"><span>${x.text}</span><span style="color:var(--green)">${x.score}%</span></div>`).join('')}
            </div>
            <div>
                <div class="h-tg b">Top CD</div>
                ${cd.map(x => `<div class="h-ti"><span>${x.text}</span><span style="color:var(--blue)">${x.score}%</span></div>`).join('')}
            </div>
            <div>
                <div class="h-tg r">Top TL</div>
                ${tl.map(x => `<div class="h-ti"><span>${x.text}</span><span style="color:var(--red)">${x.score}%</span></div>`).join('')}
            </div>
        </div>`;
    el.insertBefore(div, el.firstChild);
}

document.getElementById('inp').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById('inp').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 130) + 'px';
});
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
