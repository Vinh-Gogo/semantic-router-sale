<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Similarity Tester</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        :root{
            --bg:#0c0a09;--bg2:rgba(255,247,237,.03);--bg3:rgba(255,247,237,.05);
            --border:rgba(255,247,237,.07);--border-h:rgba(255,247,237,.13);
            --t1:#fafaf9;--t2:#a8a29e;--t3:#57534e;--t4:#292524;
            --amber:#f59e0b;--amber2:#d97706;
            --green:#34d399;--blue:#38bdf8;--red:#fb7185;
            --glow1:rgba(245,158,11,.08);--glow2:rgba(52,211,153,.05);
            --card-shadow:0 8px 40px rgba(0,0,0,.45);
            --input-bg:rgba(255,247,237,.03);
        }

        .light{
            --bg:#faf9f7;--bg2:rgba(12,10,9,.02);--bg3:rgba(12,10,9,.04);
            --border:rgba(12,10,9,.08);--border-h:rgba(12,10,9,.14);
            --t1:#1c1917;--t2:#78716c;--t3:#a8a29e;--t4:#d6d3d1;
            --amber:#d97706;--amber2:#b45309;
            --green:#059669;--blue:#0284c7;--red:#e11d48;
            --glow1:rgba(217,119,6,.04);--glow2:rgba(5,150,105,.03);
            --card-shadow:0 4px 20px rgba(0,0,0,.06);
            --input-bg:rgba(12,10,9,.02);
        }

        body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;transition:background .5s,color .5s;overflow-x:hidden;}
        body::before{content:'';position:fixed;top:-50%;left:-25%;width:90%;height:90%;background:radial-gradient(circle,var(--glow1) 0%,transparent 60%);pointer-events:none;transition:background .5s;}
        body::after{content:'';position:fixed;bottom:-40%;right:-20%;width:80%;height:80%;background:radial-gradient(circle,var(--glow2) 0%,transparent 55%);pointer-events:none;transition:background .5s;}

        .app{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:40px 28px 56px}

        /* ── Header ── */
        .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
        .brand{display:flex;align-items:center;gap:14px}
        .brand-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(145deg,var(--amber),var(--amber2));display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-weight:400;font-size:20px;color:#0c0a09;box-shadow:0 0 24px rgba(245,158,11,.25);}
        .brand h1{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;letter-spacing:-.5px;color:var(--t1)}
        .brand span{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.8px;text-transform:uppercase}

        .header-right{display:flex;align-items:center;gap:10px}
        .status{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;background:var(--bg2);border:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;color:var(--t2);transition:all .4s;letter-spacing:.3px;}
        .pulse{width:6px;height:6px;border-radius:50%;background:var(--red);transition:all .3s}
        .pulse.on{background:var(--green);box-shadow:0 0 10px var(--green);animation:pulseAnim 2s infinite}
        @keyframes pulseAnim{0%,100%{opacity:1}50%{opacity:.3}}

        .theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .3s;color:var(--t1);}
        .theme-btn:hover{border-color:var(--border-h);background:var(--bg3);transform:scale(1.06)}

        /* ── TABS ── */
        .tab-nav { display: flex; gap: 12px; margin-bottom: 24px; }
        .t-btn { padding: 10px 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; color: var(--t2); cursor: pointer; transition: all 0.3s; font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500;}
        .t-btn:hover { background: var(--bg3); border-color: var(--border-h); color: var(--t1); }
        .t-btn.active { background: linear-gradient(145deg, var(--amber), var(--amber2)); color: #0c0a09; border-color: transparent; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.2); }
        
        .view-content { display: none; animation: fadeIn 0.4s ease; }
        .view-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Glass Card ── */
        .glass{background:var(--bg2);border:1px solid var(--border);border-radius:18px;backdrop-filter:blur(24px);transition:all .4s;}
        .card-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:border-color .4s;}
        .card-head h3{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:1.2px;}
        .card-head .tag{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);background:var(--bg3);padding:3px 10px;border-radius:6px;}

        /* ── Chat ── */
        .chat-section{margin-bottom:24px}
        .msgs{flex:1;min-height:240px;max-height:440px;overflow-y:auto;overflow-x:hidden;padding:18px 22px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
        .msgs::-webkit-scrollbar, .h-list::-webkit-scrollbar, .m-list::-webkit-scrollbar {width:3px}
        .msgs::-webkit-scrollbar-track, .h-list::-webkit-scrollbar-track, .m-list::-webkit-scrollbar-track {background:transparent}
        .msgs::-webkit-scrollbar-thumb, .h-list::-webkit-scrollbar-thumb, .m-list::-webkit-scrollbar-thumb {background:var(--border);border-radius:2px}
        
        .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);font-size:13px;gap:6px;}
        .empty .ico{font-size:32px;opacity:.25;margin-bottom:6px}
        .empty p{font-family:'Instrument Serif',serif;font-style:italic;font-size:15px;color:var(--t3)}

        .bubble{max-width:80%;padding:12px 18px;border-radius:18px;font-size:13px;line-height:1.6;animation:bubbleIn .35s cubic-bezier(.22,1,.36,1);}
        @keyframes bubbleIn{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:none}}
        .bubble.me{align-self:flex-end;background:linear-gradient(145deg,var(--amber),var(--amber2));color:#0c0a09;font-weight:500;border-bottom-right-radius:4px;}
        .bubble.sys{align-self:flex-start;background:var(--bg3);border:1px solid var(--border);color:var(--t1);border-bottom-left-radius:4px;font-size:12.5px;}

        /* ── Input ── */
        .input-zone{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:flex-end;}
        .input-zone textarea{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:14px;padding:13px 18px;font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--t1);resize:none;outline:none;min-height:46px;max-height:130px;transition:all .25s;line-height:1.5;}
        .input-zone textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
        .send{height:46px;padding:0 24px;border:none;border-radius:14px;background:linear-gradient(145deg,var(--amber),var(--amber2));color:#0c0a09;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;box-shadow:0 4px 20px rgba(245,158,11,.18);}
        .send.off{opacity:.35;pointer-events:none;}

        /* ── History & Manage ── */
        .h-list, .m-list{max-height:360px;overflow-y:auto;padding:16px 22px;display:flex;flex-direction:column;gap:12px;}
        .h-empty{text-align:center;color:var(--t3);font-size:13px;padding:40px 0;}
        .h-entry, .m-item{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:all .4s;}
        .h-entry:hover, .m-item:hover{border-color:var(--border-h);background:var(--bg3)}
        
        .h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
        .h-badge{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:4px 12px;border-radius:8px;letter-spacing:.3px;}
        .h-badge.g{background:rgba(52,211,153,.1);color:var(--green)}
        .h-badge.b{background:rgba(56,189,248,.1);color:var(--blue)}
        .h-badge.r{background:rgba(251,113,133,.1);color:var(--red)}
        .h-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);}
        .h-text{font-size:12.5px;color:var(--t2);margin-bottom:14px;line-height:1.45;}

        .h-bars{display:flex;gap:10px}
        .h-bar{flex:1;display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:10px;background:var(--bg3);}
        .h-bar-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--t3);font-weight:500;}
        .h-bar-track{flex:1;height:3px;background:var(--border);border-radius:2px;}
        .h-bar-fill{height:100%;border-radius:2px;transition:width .7s}
        .h-bar-fill.g{background:var(--green)}
        .h-bar-fill.b{background:var(--blue)}
        .h-bar-fill.r{background:var(--red)}
        .h-bar-val{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;}
        .h-bar-val.g{color:var(--green)} .h-bar-val.b{color:var(--blue)} .h-bar-val.r{color:var(--red)}

        .h-tops{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:12px;font-size:10px;}
        .h-tops>div{flex:1}
        .h-tg{font-family:'DM Mono',monospace;font-weight:600;margin-bottom:5px;font-size:8px;}
        .h-tg.g{color:var(--green)} .h-tg.b{color:var(--blue)} .h-tg.r{color:var(--red)}
        .h-ti{display:flex;justify-content:space-between;color:var(--t3);padding:3px 0;gap:6px;}
        
        /* ── Manage Buttons ── */
        .m-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;}
        .m-btn { padding: 6px 12px; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; border: 1px solid var(--border); background: var(--bg2); color: var(--t2); transition: 0.3s; }
        .m-btn:hover { background: var(--bg3); border-color: var(--t3); color: var(--t1); }
        .m-btn.btn-g:hover { border-color: var(--green); color: var(--green); }
        .m-btn.btn-b:hover { border-color: var(--blue); color: var(--blue); }
        .m-btn.btn-r:hover { border-color: var(--red); color: var(--red); }
        .m-meta { font-size: 10px; color: var(--t3); font-family: 'DM Mono', monospace; margin-bottom: 8px; display: flex; justify-content: space-between; }
        
        @media(max-width:640px){
            .app{padding:24px 16px 40px}
            .h-bars,.h-tops{flex-direction:column}
        }
    </style>
</head>
<body>
<div class="app">

    <header class="header">
        <div class="brand">
            <div class="brand-icon">S</div>
            <div>
                <h1>Similarity Tester</h1>
                <span>3-dataset classification</span>
            </div>
        </div>
        <div class="header-right">
            <div class="status">
                <div class="pulse" id="dot"></div>
                <span id="conn">Connecting</span>
            </div>
            <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Chuyển giao diện">☀</button>
            <button class="t-btn" onclick="newChat()">+ Chat mới</button>
        </div>
    </header>

    <div class="tab-nav">
        <button class="t-btn active" onclick="switchTab('view-chat', this)">💬 Chat Tester</button>
        <button class="t-btn" onclick="switchTab('view-manage', this); loadManageHistory()">📂 CHƯA KIỂM TRA</button>
        <button class="t-btn" onclick="switchTab('view-reviewed', this); loadReviewedHistory()">✅ Đã Kiểm Tra</button>
    </div>

    <div id="view-chat" class="view-content active">
        <section class="chat-section">
            <div class="glass" style="display:flex;flex-direction:column">
                <div class="card-head">
                    <h3>Chat</h3>
                    <span class="tag" id="msgN">0</span>
                </div>
                <div class="msgs" id="msgs">
                    <div class="empty">
                        <div class="ico">◈</div>
                        <p>Nhập tin nhắn để phân loại</p>
                    </div>
                </div>
                <div class="input-zone">
                    <textarea id="inp" placeholder="Nhập tin nhắn..." rows="1"></textarea>
                    <button class="send" id="btn" onclick="send()">Gửi</button>
                </div>
            </div>
        </section>

        <section class="history-section">
            <div class="glass">
                <div class="card-head">
                    <h3>Lịch sử Session</h3>
                    <span class="tag" id="hN">0</span>
                </div>
                <div class="h-list" id="hList">
                    <div class="h-empty"><p>Chưa có đánh giá nào</p></div>
                </div>
            </div>
        </section>
    </div>

    <div id="view-manage" class="view-content">
        <section class="history-section">
            <div class="glass">
                <div class="card-head">
                    <h3>Đánh giá lại hội thoại (Top 50 gần nhất)</h3>
                    <button class="t-btn" onclick="loadManageHistory()" style="padding: 4px 10px; font-size: 9px;">🔄 Làm mới</button>
                </div>
                <div class="m-list" id="mList">
                    <div class="h-empty"><p>Đang tải dữ liệu...</p></div>
                </div>
            </div>
        </section>
    </div>

    <div id="view-reviewed" class="view-content">
        <section class="history-section">
            <div class="glass">
                <div class="card-head">
                    <h3>Dữ liệu đã kiểm tra (Top 50)</h3>
                    <button class="t-btn" onclick="loadReviewedHistory()" style="padding: 4px 10px; font-size: 9px;">🔄 Làm mới</button>
                </div>
                <div class="m-list" id="rList">
                    <div class="h-empty"><p>Đang tải dữ liệu...</p></div>
                </div>
            </div>
        </section>
    </div>

</div>

<script>
    function newChat() {
    H = [];
    currentChatId = null;
    document.getElementById('msgs').innerHTML = '<div class="empty"><div class="ico">◈</div><p>Nhập tin nhắn để phân loại</p></div>';
    document.getElementById('msgN').textContent = '0';
    }
    let ws, H = [], N = 0, isLight = false, currentChatId = null;
    const LM = { 'tao_lao': { c: 'r' }, 'binh_thuong': { c: 'g' }, 'crawl_data': { c: 'b' } };

    function toggleTheme() {
        isLight = !isLight;
        document.body.classList.toggle('light', isLight);
        document.getElementById('themeBtn').textContent = isLight ? '☾' : '☀';
    }

    function switchTab(viewId, btn) {
        document.querySelectorAll('.view-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.t-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        btn.classList.add('active');
    }

    function init() {
        ws = new WebSocket(`ws://${location.host}/ws/calculate`);
        ws.onopen = () => {
            document.getElementById('dot').classList.add('on');
            document.getElementById('conn').textContent = 'Live';
        };
        ws.onclose = () => {
            document.getElementById('dot').classList.remove('on');
            document.getElementById('conn').textContent = 'Reconnect';
            setTimeout(init, 2000);
        };
    }

    async function send() {
        const inp = document.getElementById('inp');
        const t = inp.value.trim();
        if (!t) return;

        H.push(t);
        const full = H.join('\n');
        document.getElementById('msgN').textContent = H.length;

        const box = document.getElementById('msgs');
        const emp = box.querySelector('.empty');
        if (emp) emp.remove();

        const m = document.createElement('div');
        m.className = 'bubble me';
        m.textContent = t;
        box.appendChild(m);
        box.scrollTop = box.scrollHeight;

        inp.value = '';
        inp.style.height = 'auto';

        const btn = document.getElementById('btn');
        btn.classList.add('off');
        btn.textContent = '…';

        const wordCount = full.replace(/\n/g, ' ').trim().split(/\s+/).length;
        if (wordCount <= 3) {
            const s = document.createElement('div');
            s.className = 'bubble sys';
            s.innerHTML = `<span style="color:var(--t3)"><em>Đang chờ thêm ngữ cảnh... (mới có ${wordCount} từ)</em></span>`;
            box.appendChild(s);
            box.scrollTop = box.scrollHeight;
            btn.classList.remove('off');
            btn.textContent = 'Gửi';
            return; 
        }

        if (ws && ws.readyState === 1) {
            ws.send(full);
            const once = e => {
                const d = JSON.parse(e.data);
                const calcAvg = (arr) => {
                    if (!arr || arr.length === 0) return 0;
                    const sum = arr.reduce((acc, curr) => acc + curr.score, 0);
                    return parseFloat((sum / arr.length).toFixed(1));
                };

                const sc = {
                    'tao_lao': calcAvg(d.top?.tao_lao),
                    'crawl_data': calcAvg(d.top?.crawl_data),
                    'binh_thuong': calcAvg(d.top?.binh_thuong)
                };

                const pred = Object.entries(sc).sort((a, b) => b[1] - a[1])[0];
                const lm = LM[pred[0]];
                const labelNames = { 'binh_thuong': 'Bình Thường', 'crawl_data': 'Crawl Data', 'tao_lao': 'Tào Lao' };
                const displayName = labelNames[pred[0]];
                const col = pred[0] === 'binh_thuong' ? 'var(--green)' : pred[0] === 'crawl_data' ? 'var(--blue)' : 'var(--red)';

                const s = document.createElement('div');
                s.className = 'bubble sys';
                s.innerHTML = `<strong style="color:${col}">${displayName}</strong> ${pred[1]}%`;
                box.appendChild(s);
                box.scrollTop = box.scrollHeight;

                addHist(full, d, pred, lm, sc);
                btn.classList.remove('off');
                btn.textContent = 'Gửi';
                ws.removeEventListener('message', once);
            };
            ws.addEventListener('message', once);
        }

        try {
            const response = await fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    id: currentChatId, // Gửi ID hiện tại (lần đầu là null)
                    text: t, 
                    full_conversation: full 
                })
            });
            const result = await response.json();
            if (result.id) {
                currentChatId = result.id; // Lưu lại ID Server trả về để dùng cho câu sau
            }
        } catch (e) {}
    }

    function addHist(text, d, pred, lm, sc) {
        const el = document.getElementById('hList');
        const emp = el.querySelector('.h-empty');
        if (emp) emp.remove();
        document.getElementById('hN').textContent = ++N;

        const div = document.createElement('div');
        div.className = 'h-entry';
        div.innerHTML = `
            <div class="h-top">
                <span class="h-badge ${lm.c}">${pred[0]}</span>
            </div>
            <div class="h-text">${text.replace(/\n/g, '<br>')}</div>
            <div class="h-bars">
                <div class="h-bar"><span class="h-bar-label">BT</span><div class="h-bar-track"><div class="h-bar-fill g" style="width:${sc.binh_thuong || 0}%"></div></div></div>
                <div class="h-bar"><span class="h-bar-label">CD</span><div class="h-bar-track"><div class="h-bar-fill b" style="width:${sc.crawl_data || 0}%"></div></div></div>
                <div class="h-bar"><span class="h-bar-label">TL</span><div class="h-bar-track"><div class="h-bar-fill r" style="width:${sc.tao_lao || 0}%"></div></div></div>
            </div>`;
        el.insertBefore(div, el.firstChild);
    }

    // ---- MANAGE TAB LOGIC ----
    async function loadManageHistory() {
        const list = document.getElementById('mList');
        list.innerHTML = `<div class="h-empty"><p>Đang tải dữ liệu...</p></div>`;
        try {
            // Thêm timestamp và no-store để ép trình duyệt luôn lấy dữ liệu mới nhất từ Server
            const res = await fetch('/api/history?t=' + new Date().getTime(), { cache: 'no-store' });
            const data = await res.json();
            
            if (!data || data.length === 0) {
                list.innerHTML = `<div class="h-empty"><p>Chưa có dữ liệu</p></div>`;
                return;
            }

            list.innerHTML = '';
            data.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'm-item';
                div.id = `m-item-${index}`;
                
                // THÊM DÒNG NÀY: Mã hóa an toàn tuyệt đối kể cả dấu nháy đơn
                const safeText = encodeURIComponent(item.full_conversation).replace(/'/g, "%27");
                
                div.innerHTML = `
                    <div class="m-meta">
                        <span>#${item.id || '?'} | Dự đoán cũ: <strong>${item.predicted_label || 'N/A'}</strong></span>
                        <span>${new Date(item.timestamp).toLocaleString('vi-VN')}</span>
                    </div>
                    <div class="h-text" style="color:var(--t1)">${item.full_conversation.replace(/\n/g, '<br>')}</div>
                    <div class="m-actions">
                        <button class="m-btn btn-g" onclick="relabel('${safeText}', 'binh_thuong', 'm-item-${index}')">✅ Đánh dấu: Bình Thường</button>
                        <button class="m-btn btn-b" onclick="relabel('${safeText}', 'crawl_data', 'm-item-${index}')">🤖 Đánh dấu: Crawl Data</button>
                        <button class="m-btn btn-r" onclick="relabel('${safeText}', 'tao_lao', 'm-item-${index}')">❌ Đánh dấu: Tào Lao</button>
                    </div>
                `;
                list.appendChild(div);
            });
        } catch (e) {
            list.innerHTML = `<div class="h-empty"><p style="color:var(--red)">Lỗi khi tải dữ liệu!</p></div>`;
        }
    }

    async function loadReviewedHistory() {
        const list = document.getElementById('rList');
        list.innerHTML = `<div class="h-empty"><p>Đang tải dữ liệu...</p></div>`;
        try {
            // Gọi API mới tạo, chống cache
            const res = await fetch('/api/reviewed_history?t=' + new Date().getTime(), { cache: 'no-store' });
            const data = await res.json();
            
            if (!data || data.length === 0) {
                list.innerHTML = `<div class="h-empty"><p>Chưa có dữ liệu nào được kiểm tra</p></div>`;
                return;
            }

            list.innerHTML = '';
            data.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'm-item';
                div.id = `r-item-${index}`; // Tạo ID duy nhất cho khung này
                
                const safeText = encodeURIComponent(item.full_conversation).replace(/'/g, "%27");
                
                div.innerHTML = `
                    <div class="m-meta">
                        <span>#${item.id || '?'} | Nhãn chốt: <strong style="color:var(--amber)">${item.predicted_label || 'N/A'}</strong></span>
                        <span>${new Date(item.timestamp).toLocaleString('vi-VN')}</span>
                    </div>
                    <div class="h-text" style="color:var(--t1)">${item.full_conversation.replace(/\n/g, '<br>')}</div>
                    <div class="m-actions">
                        <span style="font-size: 11px; color: var(--t3); align-self: center; margin-right: 6px;">Sửa lại nhãn:</span>
                        <button class="m-btn btn-g" onclick="relabel('${safeText}', 'binh_thuong', 'r-item-${index}')">✅ Bình Thường</button>
                        <button class="m-btn btn-b" onclick="relabel('${safeText}', 'crawl_data', 'r-item-${index}')">🤖 Crawl Data</button>
                        <button class="m-btn btn-r" onclick="relabel('${safeText}', 'tao_lao', 'r-item-${index}')">❌ Tào Lao</button>
                    </div>
                `;
                list.appendChild(div);
            });
        } catch (e) {
            list.innerHTML = `<div class="h-empty"><p style="color:var(--red)">Lỗi khi tải dữ liệu!</p></div>`;
        }
    }

    async function relabel(encodedText, newLabel, elId) {
        const text = decodeURIComponent(encodedText);
        const btnBox = document.querySelector(`#${elId} .m-actions`);
        btnBox.innerHTML = `<span style="font-size:11px; color:var(--amber);">Đang lưu vào Vector DB & File...</span>`;
        
        try {
            const res = await fetch('/api/relabel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_conversation: text, new_label: newLabel })
            });
            const data = await res.json();
            
            if (data.status === "ok") {
                btnBox.innerHTML = `<span style="font-size:12px; color:var(--green); font-weight:500;">✓ Đã cập nhật nhãn <b>${newLabel}</b> thành công!</span>`;
                setTimeout(() => document.getElementById(elId).style.display = 'none', 1500);
            } else {
                btnBox.innerHTML = `<span style="font-size:12px; color:var(--red);">Lỗi: ${data.error}</span>`;
            }
        } catch (e) {
            btnBox.innerHTML = `<span style="font-size:12px; color:var(--red);">Lỗi kết nối Server</span>`;
        }
    }

    document.getElementById('inp').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    document.getElementById('inp').addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 130) + 'px';
    });
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
